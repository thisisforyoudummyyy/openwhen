<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Open When...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff8fe;
      color: #2c2c2a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header .top-emoji {
      font-size: 48px;
      display: block;
      margin-bottom: 0.75rem;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 600;
      color: #c45c8a;
      margin-bottom: 0.5rem;
    }

    .header p {
      font-size: 15px;
      color: #888;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      max-width: 540px;
      margin: 0 auto 2rem;
    }

    .mood-btn {
      background: #fff;
      border: 1.5px solid #f4c0d1;
      border-radius: 16px;
      padding: 18px 12px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
    }

    .mood-btn:hover {
      background: #fff0f6;
      border-color: #d4537e;
      transform: scale(1.04);
    }

    .mood-btn:active {
      transform: scale(0.97);
    }

    .mood-emoji {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }

    .mood-label {
      font-size: 13px;
      font-weight: 600;
      color: #993556;
    }

    .message-card {
      display: none;
      max-width: 540px;
      margin: 0 auto;
      background: #fff;
      border: 1.5px solid #f4c0d1;
      border-radius: 20px;
      padding: 2rem 1.5rem;
    }

    .message-card.visible {
      display: block;
    }

    .card-emoji {
      font-size: 40px;
      display: block;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #d4537e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .card-text {
      font-size: 16px;
      color: #3d3d3a;
      line-height: 1.85;
      margin-bottom: 1.5rem;
    }

    .back-btn {
      background: none;
      border: 1.5px solid #f4c0d1;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: #993556;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }

    .back-btn:hover {
      background: #fff0f6;
    }

    .footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 13px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <div id="home">
    <div class="header">
      <span class="top-emoji">💌</span>
      <h1>Open when...</h1>
      <p>Hey you. Pick how you're feeling right now<br>and I've got something just for you.</p>
    </div>

    <div class="grid">
      <button class="mood-btn" onclick="show('happy')">
        <span class="mood-emoji">😊</span>
        <span class="mood-label">Happy</span>
      </button>
      <button class="mood-btn" onclick="show('sad')">
        <span class="mood-emoji">😢</span>
        <span class="mood-label">Sad</span>
      </button>
      <button class="mood-btn" onclick="show('bored')">
        <span class="mood-emoji">😴</span>
        <span class="mood-label">Bored</span>
      </button>
      <button class="mood-btn" onclick="show('hungry')">
        <span class="mood-emoji">🍜</span>
        <span class="mood-label">Hungry</span>
      </button>
      <button class="mood-btn" onclick="show('sleepy')">
        <span class="mood-emoji">🌙</span>
        <span class="mood-label">Sleepy</span>
      </button>
      <button class="mood-btn" onclick="show('loved')">
        <span class="mood-emoji">🥰</span>
        <span class="mood-label">Loved</span>
      </button>
      <button class="mood-btn" onclick="show('laugh')">
        <span class="mood-emoji">😂</span>
        <span class="mood-label">Need a laugh</span>
      </button>
      <button class="mood-btn" onclick="show('lonely')">
        <span class="mood-emoji">🫂</span>
        <span class="mood-label">Lonely</span>
      </button>
      <button class="mood-btn" onclick="show('stressed')">
        <span class="mood-emoji">😰</span>
        <span class="mood-label">Stressed</span>
      </button>
      <button class="mood-btn" onclick="show('angry')">
        <span class="mood-emoji">😤</span>
        <span class="mood-label">Angry</span>
      </button>
      <button class="mood-btn" onclick="show('cantsleep')">
        <span class="mood-emoji">🌃</span>
        <span class="mood-label">Can't sleep</span>
      </button>
      <button class="mood-btn" onclick="show('sick')">
        <span class="mood-emoji">🤒</span>
        <span class="mood-label">Sick</span>
      </button>
    </div>

    <div class="footer">made with love, just for you 💕</div>
  </div>

  <div class="message-card" id="msg-card">
    <span class="card-emoji" id="msg-emoji"></span>
    <div class="card-title" id="msg-title"></div>
    <div class="card-text" id="msg-text"></div>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>

  <script>
    const messages = {
      happy: {
        emoji: "😊",
        title: "Open when you're happy",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      sad: {
        emoji: "😢",
        title: "Open when you're sad",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      bored: {
        emoji: "😴",
        title: "Open when you're bored",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      hungry: {
        emoji: "🍜",
        title: "Open when you're hungry",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      sleepy: {
        emoji: "🌙",
        title: "Open when you're sleepy",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      loved: {
        emoji: "🥰",
        title: "Open when you feel loved",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      laugh: {
        emoji: "😂",
        title: "Open when you need a laugh",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      lonely: {
        emoji: "🫂",
        title: "Open when you feel lonely",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      stressed: {
        emoji: "😰",
        title: "Open when you're stressed",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      angry: {
        emoji: "😤",
        title: "Open when you're angry",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      cantsleep: {
        emoji: "🌃",
        title: "Open when you can't sleep",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      },
      sick: {
        emoji: "🤒",
        title: "Open when you're sick",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "Quote: ABCDE\n\nMe: hiiii"
      }
    };

    function show(mood) {
      const m = messages[mood];
      document.getElementById('msg-emoji').textContent = m.emoji;
      document.getElementById('msg-title').textContent = m.title;
      document.getElementById('msg-text').textContent = m.text;
      document.getElementById('home').style.display = 'none';
      const card = document.getElementById('msg-card');
      card.classList.add('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goBack() {
      document.getElementById('home').style.display = 'block';
      document.getElementById('msg-card').classList.remove('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>

</body>
</html>
