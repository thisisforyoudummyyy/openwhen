<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Open When...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff8fe;
      color: #2c2c2a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header .top-emoji {
      font-size: 48px;
      display: block;
      margin-bottom: 0.75rem;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 600;
      color: #c45c8a;
      margin-bottom: 0.5rem;
    }

    .header p {
      font-size: 15px;
      color: #888;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      max-width: 540px;
      margin: 0 auto 2rem;
    }

    .mood-btn {
      background: #fff;
      border: 1.5px solid #f4c0d1;
      border-radius: 16px;
      padding: 18px 12px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
    }

    .mood-btn:hover {
      background: #fff0f6;
      border-color: #d4537e;
      transform: scale(1.04);
    }

    .mood-btn:active {
      transform: scale(0.97);
    }

    .mood-emoji {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }

    .mood-label {
      font-size: 13px;
      font-weight: 600;
      color: #993556;
    }

    .message-card {
      display: none;
      max-width: 540px;
      margin: 0 auto;
      background: #fff;
      border: 1.5px solid #f4c0d1;
      border-radius: 20px;
      padding: 2rem 1.5rem;
    }

    .message-card.visible {
      display: block;
    }

    .card-emoji {
      font-size: 40px;
      display: block;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #d4537e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .card-text {
      font-size: 16px;
      color: #3d3d3a;
      line-height: 1.85;
      margin-bottom: 1.5rem;
    }

    .back-btn {
      background: none;
      border: 1.5px solid #f4c0d1;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: #993556;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }

    .back-btn:hover {
      background: #fff0f6;
    }

    .footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 13px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <div id="home">
    <div class="header">
      <span class="top-emoji">💌</span>
      <h1>Open when...</h1>
      <p>happy birthday dummy!! hehe sorry idk what to get you <br> sooo i made this!! okay boring, fuck you</p>
    </div>

    <div class="grid">
      <button class="mood-btn" onclick="show('goodday')">
        <span class="mood-emoji">😆</span>
        <span class="mood-label">having a good day</span>
      </button>
      <button class="mood-btn" onclick="show('accomplished')">
        <span class="mood-emoji">✨</span>
        <span class="mood-label">you accomplished something</span>
      </button>
      <button class="mood-btn" onclick="show('aura')">
        <span class="mood-emoji">🤡</span>
        <span class="mood-label">you're acting cool but we both know you're not (aura my ass)</span>
      </button>
      <button class="mood-btn" onclick="show('alone')">
        <span class="mood-emoji">🫂</span>
        <span class="mood-label">you feel alone</span>
      </button>
      <button class="mood-btn" onclick="show('procrastinate')">
        <span class="mood-emoji">🙃</span>
        <span class="mood-label">you're procrastinating instead of doing work</span>
      </button>
      <button class="mood-btn" onclick="show('bored')">
        <span class="mood-emoji">😈</span>
        <span class="mood-label">you're bored and bothering people</span>
      </button>
      <button class="mood-btn" onclick="show('thinking')">
        <span class="mood-emoji">🤍</span>
        <span class="mood-label">you're thinking about things you won’t tell anyone</span>
      </button>
      <button class="mood-btn" onclick="show('pretend')">
        <span class="mood-emoji">🎭</span>
        <span class="mood-label">you're tired of pretending you're okay</span>
      </button>
      <button class="mood-btn" onclick="show('textmepls')">
        <span class="mood-emoji">📱</span>
        <span class="mood-label">you feel like texting me but don't</span>
      </button>
      <button class="mood-btn" onclick="show('thinkaboutu')">
        <span class="mood-emoji">👀</span>
        <span class="mood-label">you're wondering if anyone thinks about you</span>
      </button>
      <button class="mood-btn" onclick="show('cryalone')">
        <span class="mood-emoji">😞</span>
        <span class="mood-label">you're crying alone</span>
      </button>
      <button class="mood-btn" onclick="show('diff')">
        <span class="mood-emoji">💙</span>
        <span class="mood-label">you wish things were different</span>
      </button>
    </div>

    <div class="footer">made with love, just for you 💕</div>
  </div>

  <div class="message-card" id="msg-card">
    <span class="card-emoji" id="msg-emoji"></span>
    <div class="card-title" id="msg-title"></div>
    <div class="card-text" id="msg-text"></div>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>

  <script>
    const messages = {
      goodday: {
        emoji: "😆",
        title: "Open when you're having a good day",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      accomplished: {
        emoji: "✨",
        title: "Open when you accomplished something",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      aura: {
        emoji: "🤡",
        title: "Open when you're acting cool but we both know you're not (aura my ass)",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      alone: {
        emoji: "🫂",
        title: "Open when you feel alone",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      procrastinate: {
        emoji: "🙃",
        title: "Open when you're procrastinating instead of doing work (stop looking at other guys😠)",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      bored: {
        emoji: "😈",
        title: "Open when you're bored and bothering people",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      thinking: {
        emoji: "🤍",
        title: "Open when you're thinking about things you won’t tell anyone",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      pretend: {
        emoji: "🎭",
        title: "Open when you're tired of pretending you're okay",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      textmepls: {
        emoji: "📱",
        title: "Open when you feel like texting me but don't",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      thinkaboutu: {
        emoji: "👀",
        title: "Open when you're wondering if anyone thinks about you (spoiler: yes 👀)",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      cryalone: {
        emoji: "😞",
        title: "Open when you're crying alone",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      },
      diff: {
        emoji: "💙",
        title: "Open when you wish things were different",
        // ✏️ EDIT YOUR MESSAGE BELOW
        text: "The best is yet to come.\n\np.s. I really believe this for you 💛"
      }
    };

    function show(mood) {
      const m = messages[mood];
      document.getElementById('msg-emoji').textContent = m.emoji;
      document.getElementById('msg-title').textContent = m.title;
      document.getElementById('msg-text').innerHTML = m.text.replace(/\n/g, '<br>');
      document.getElementById('home').style.display = 'none';
      const card = document.getElementById('msg-card');
      card.classList.add('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goBack() {
      document.getElementById('home').style.display = 'block';
      document.getElementById('msg-card').classList.remove('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>

</body>
</html>
